services:
  backend:
    build: ./backend
    container_name: ipad-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/ipad.db}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    volumes:
      # Bind mounts: data lives in plain local folders for easy backup/transfer.
      - ${DATA_DIR:-./data}:/app/data      # -> ./data/ipad.db
      - ${UPLOADS_DIR:-./uploads}:/app/uploads  # -> delivery confirmation photos
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_ADMIN_PASSWORD: ${VITE_ADMIN_PASSWORD:-}
        VITE_CANCEL_PASSWORD: ${VITE_CANCEL_PASSWORD:-}
    container_name: ipad-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      - backend
